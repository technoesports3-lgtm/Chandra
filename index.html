        // ==================== FIX 2: VISIBILITY & BEFOREUNLOAD PRESENCE HANDLERS ====================
        function setupPresenceEventHandlers() {
            // When the tab becomes hidden (user switches apps, locks phone, or closes tab),
            // immediately mark the user as offline.
            document.addEventListener('visibilitychange', () => {
                if (!currentUser) return;
                if (document.visibilityState === 'hidden') {
                    // User left the app — set offline
                    db.collection('presence').doc(currentUser.uid).set({
                        online: false,
                        lastActive: firebase.firestore.FieldValue.serverTimestamp()
                    }).catch(err => console.error('Presence visibilitychange error:', err));
                } else if (document.visibilityState === 'visible') {
                    // User returned — set online
                    db.collection('presence').doc(currentUser.uid).set({
                        online: true,
                        lastActive: firebase.firestore.FieldValue.serverTimestamp()
                    }).catch(err => console.error('Presence visibilitychange error:', err));
                }
            });

            // Backup: before the tab unloads, set the user offline.
            window.addEventListener('beforeunload', () => {
                if (!currentUser) return;
                // Best-effort Firestore write during unload
                db.collection('presence').doc(currentUser.uid).set({
                    online: false,
                    lastActive: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(() => {});
            });
        }

        // ==================== ESCAPE HTML ====================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== AUTH STATE OBSERVER ====================
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                console.log('Logged in as:', user.email);
                /* NEW: Initialize OneSignal */
                setupOneSignalUser(user.uid);
                db.collection('users').doc(user.uid).get().then((doc) => {
                    if (!doc.exists) {
                        db.collection('users').doc(user.uid).set({
                            name: user.displayName || user.email.split('@')[0],
                            email: user.email,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        }).catch(e => console.error('Error creating user doc:', e));
                    }
                }).catch(e => console.error('Error checking user doc:', e));
                if (document.getElementById('auth-screen').style.display === 'block') {
                    showUsersList();
                }
                /* NEW: Update presence on login */
                updatePresence(true);
            } else {
                /* NEW: Set offline before clearing */
                if (currentUser) updatePresence(false);
                currentUser = null;
                cleanupListeners();
                chatListData.clear();
                acceptedChats.clear();
                pendingRequests.clear();
                reactionsCache.clear();
                if (document.getElementById('users-screen').style.display !== 'none' ||
                    document.getElementById('chat-screen').style.display !== 'none') {
                    returnToCalculator();
                }
            }
        });

        // ==================== INITIALIZATION ====================
        updateDisplay();
        returnToCalculator();
        /* NEW: Setup panic detection */
        setupPanicDetection();
        /* FIX 1: Setup viewport handler for keyboard overlap */
        setupViewportHandler();
        /* FIX 2: Setup presence event handlers (visibilitychange + beforeunload) */
        setupPresenceEventHandlers();

        // Handle keyboard appearance
        const chatInputEl = document.getElementById('chat-input');
        chatInputEl.addEventListener('focus', () => {
            setTimeout(() => {
                chatInputEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
                /* FIX 1: Re-apply keyboard padding when input is focused */
                applyKeyboardPadding();
            }, 300);
        });

        // Initialize auto-expand
        autoExpandTextarea();

        // Set initial mic/send button state
        document.getElementById('mic-btn').style.display = 'inline-flex';
        document.getElementById('send-btn').style.display = 'none';

        console.log('App initialized with Instagram/WhatsApp hybrid features.');
        console.log('FIXES APPLIED: 1) Mobile keyboard overlap via visualViewport, 2) Presence via visibilitychange/beforeunload, 3) OneSignal via CORS proxy');
    </script>
</body>
</html>
