        // ==================== SEARCH FUNCTIONALITY ====================
        let searchTimeout = null;
        function searchUsers() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('search-results');
            
            if (searchTimeout) clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                resultsDiv.style.display = 'none';
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const usersSnapshot = await db.collection('users').get();
                    const results = [];
                    
                    usersSnapshot.forEach((doc) => {
                        if (doc.id === currentUser.uid) return;
                        
                        const userData = doc.data();
                        const name = (userData.name || '').toLowerCase();
                        const email = (userData.email || '').toLowerCase();
                        
                        if (name.includes(query) || email.includes(query)) {
                            results.push({ id: doc.id, ...userData });
                        }
                    });
                    
                    if (results.length === 0) {
                        resultsDiv.innerHTML = '<div style="padding: 16px; text-align: center; color: #888;">No users found</div>';
                    } else {
                        resultsDiv.innerHTML = results.map(user => createSearchResultItem(user)).join('');
                    }
                    
                    resultsDiv.style.display = 'block';
                } catch (error) {
                    console.error('Search error:', error);
                }
            }, 300); // Slightly faster response
        }

        function createSearchResultItem(user) {
            const isPending = pendingRequests.has(user.id);
            const isAccepted = acceptedChats.has(user.id);
            
            let buttonHtml = '';
            if (isAccepted) {
                buttonHtml = `<span class="request-badge">Added</span>`;
            } else if (isPending) {
                buttonHtml = `<span class="request-badge">Request Sent</span>`;
            } else {
                buttonHtml = `<button class="accept-btn" onclick="sendChatRequest('${user.id}')">Add</button>`;
            }
            
            return `
                <div class="search-result-item">
                    <div class="user-avatar">${(user.name || 'U')[0].toUpperCase()}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name || 'User')}</div>
                        <div class="user-email">${escapeHtml(user.email)}</div>
                    </div>
                    ${buttonHtml}
                </div>
            `;
        }

        // ==================== CHAT REQUEST SYSTEM ====================
        async function sendChatRequest(targetUserId) {
            if (!currentUser || targetUserId === currentUser.uid) return;
            
            try {
                const existingRequest = await db.collection('chatRequests')
                    .where('fromUserId', '==', currentUser.uid)
                    .where('toUserId', '==', targetUserId)
                    .where('status', '==', 'pending')
                    .get();
                
                if (!existingRequest.empty) {
                    alert('Request already sent');
                    return;
                }
                
                await db.collection('chatRequests').add({
                    fromUserId: currentUser.uid,
                    fromUserName: currentUser.displayName || currentUser.email.split('@')[0],
                    toUserId: targetUserId,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                document.getElementById('search-results').style.display = 'none';
                document.getElementById('search-input').value = '';
                
                alert('Chat request sent successfully!');
                
            } catch (error) {
                console.error('Error sending request:', error);
                alert('Failed to send request');
            }
        }

        async function acceptChatRequest(requestId, fromUserId) {
            try {
                await db.collection('chatRequests').doc(requestId).update({
                    status: 'accepted'
                });
                
                await db.collection('acceptedChats').add({
                    userId1: currentUser.uid,
                    userId2: fromUserId,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                loadRequests();
                
            } catch (error) {
                console.error('Error accepting request:', error);
                alert('Failed to accept request');
            }
        }

        async function rejectChatRequest(requestId) {
            try {
                await db.collection('chatRequests').doc(requestId).update({
                    status: 'rejected'
                });
                
                loadRequests();
            } catch (error) {
                console.error('Error rejecting request:', error);
            }
        }

        // ==================== LOAD DATA ====================
        function loadData() {
            loadAcceptedChats();
            loadRequests();
            setupUnreadMessagesListener();
        }

        function loadAcceptedChats() {
            if (!currentUser) return;
            
            if (acceptedChatsListener) {
                acceptedChatsListener();
            }
            
            acceptedChatsListener = db.collection('acceptedChats')
                .where('userId1', '==', currentUser.uid)
                .onSnapshot((snapshot) => {
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        acceptedChats.add(data.userId2);
                        loadUserData(data.userId2);
                    });
                    
                    db.collection('acceptedChats')
                        .where('userId2', '==', currentUser.uid)
                        .get()
                        .then((snapshot2) => {
                            snapshot2.forEach((doc) => {
                                const data = doc.data();
                                acceptedChats.add(data.userId1);
                                loadUserData(data.userId1);
                            });
                            
                            renderChatList();
                        });
                });
        }

        function loadUserData(userId) {
            db.collection('users').doc(userId).get().then((doc) => {
                if (doc.exists) {
                    if (!chatListData.has(userId)) {
                        chatListData.set(userId, {
                            userData: doc.data(),
                            lastMessage: null,
                            unreadCount: 0,
                            lastMessageTime: null
                        });
                    } else {
                        const data = chatListData.get(userId);
                        data.userData = doc.data();
                        chatListData.set(userId, data);
                    }
                    renderChatList();
                }
            });
        }

        function loadRequests() {
            if (!currentUser) return;
            
            if (requestsListener) {
                requestsListener();
            }
            
            requestsListener = db.collection('chatRequests')
                .where('toUserId', '==', currentUser.uid)
                .where('status', '==', 'pending')
                .onSnapshot((snapshot) => {
                    pendingRequests.clear();
                    
                    snapshot.forEach((doc) => {
                        const request = doc.data();
                        pendingRequests.set(request.fromUserId, {
                            requestId: doc.id,
                            ...request
                        });
                        
                        loadRequesterData(request.fromUserId, doc.id, request);
                    });
                    
                    renderRequestsList();
                });
        }

        function loadRequesterData(userId, requestId, requestData) {
            db.collection('users').doc(userId).get().then((doc) => {
                if (doc.exists) {
                    const request = pendingRequests.get(userId);
                    if (request) {
                        request.fromUserData = doc.data();
                        pendingRequests.set(userId, request);
                        renderRequestsList();
                    }
                }
            });
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderChatList() {
            const container = document.getElementById('chats-container');
            container.innerHTML = '';
            
            const sortedChats = Array.from(chatListData.entries())
                .filter(([userId]) => acceptedChats.has(userId))
                .sort((a, b) => {
                    const timeA = a[1].lastMessageTime ? a[1].lastMessageTime.toDate() : new Date(0);
                    const timeB = b[1].lastMessageTime ? b[1].lastMessageTime.toDate() : new Date(0);
                    return timeB - timeA;
                });
            
            if (sortedChats.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">No chats yet. Search for users to start chatting!</div>';
                return;
            }
            
            sortedChats.forEach(([userId, data]) => {
                if (data.userData) {
                    const userElement = createChatListItem(userId, data);
                    container.appendChild(userElement);
                }
            });
        }

        function renderRequestsList() {
            const container = document.getElementById('requests-container');
            container.innerHTML = '';
            
            if (pendingRequests.size === 0) {
                container.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">No pending requests</div>';
                return;
            }
            
            pendingRequests.forEach((request, userId) => {
                if (request.fromUserData) {
                    const requestElement = createRequestItem(userId, request);
                    container.appendChild(requestElement);
                }
            });
        }

        function createRequestItem(userId, request) {
            const div = document.createElement('div');
            div.className = 'request-item';
            
            const userData = request.fromUserData;
            const name = userData.name || userData.email?.split('@')[0] || 'User';
            const email = userData.email || 'No email';
            
            div.innerHTML = `
                <div class="user-avatar">${name[0].toUpperCase()}</div>
                <div class="request-info">
                    <div class="request-name">${escapeHtml(name)}</div>
                    <div class="request-email">${escapeHtml(email)}</div>
                </div>
                <div class="request-actions">
                    <button class="accept-btn" onclick="acceptChatRequest('${request.requestId}', '${userId}')">Accept</button>
                    <button class="reject-btn" onclick="rejectChatRequest('${request.requestId}')">Reject</button>
                </div>
            `;
            
            return div;
        }

        function createChatListItem(userId, data) {
            const div = document.createElement('div');
            div.className = `user-item ${data.unreadCount > 0 ? 'unread' : ''}`;
            div.onclick = () => openChat(userId, data.userData);
            
            const userData = data.userData;
            const name = userData.name || userData.email?.split('@')[0] || 'User';
            const initial = name[0]?.toUpperCase() || '?';
            
            let timeString = '';
            if (data.lastMessageTime) {
                const date = data.lastMessageTime.toDate();
                const now = new Date();
                const diff = now - date;
                
                if (diff < 86400000) {
                    timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else {
                    timeString = date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                }
            }
            
            let lastMessagePreview = '';
            if (data.lastMessage) {
                if (data.lastMessage.text) {
                    lastMessagePreview = data.lastMessage.text;
                } else if (data.lastMessage.audioUrl) {
                    lastMessagePreview = '🎤 Voice note';
                } else if (data.lastMessage.imageUrl) {
                    lastMessagePreview = '📷 Image';
                }
            }
            
            if (lastMessagePreview.length > 30) {
                lastMessagePreview = lastMessagePreview.substring(0, 27) + '...';
            }
            
            div.innerHTML = `
                <div class="user-avatar">${initial}</div>
                <div class="user-info">
                    <div class="user-name-row">
                        <div class="user-name">${escapeHtml(name)}</div>
                        <div class="user-time">${timeString}</div>
                    </div>
                    <div class="user-last-message">
                        <div class="last-message-text">
                            ${escapeHtml(lastMessagePreview)}
                        </div>
                        ${data.unreadCount > 0 ? `<div class="unread-badge">${data.unreadCount}</div>` : ''}
                    </div>
                </div>
            `;
            
            return div;
        }

        // ==================== UNREAD MESSAGES LISTENER ====================
        function setupUnreadMessagesListener() {
            if (!currentUser) return;
            
            if (unreadMessagesListener) {
                unreadMessagesListener();
            }
            
            unreadMessagesListener = db.collection('messages')
                .where('receiverId', '==', currentUser.uid)
                .where('status', '==', 'sent')
                .onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === 'added') {
                            const message = change.doc.data();
                            const senderId = message.senderId;
                            const isCurrentOpenChat = selectedUserId === senderId && document.getElementById('chat-screen').style.display === 'flex';
                            change.doc.ref.update({ status: isCurrentOpenChat ? 'read' : 'delivered' }).catch(() => {});
                            
                            if (acceptedChats.has(senderId)) {
                                if (!chatListData.has(senderId)) {
                                    loadUserData(senderId);
                                }
                                
                                const data = chatListData.get(senderId) || { unreadCount: 0 };
                                data.lastMessage = message;
                                data.unreadCount = (data.unreadCount || 0) + 1;
                                data.lastMessageTime = message.timestamp;
                                chatListData.set(senderId, data);
                                
                                renderChatList();
                            }
                        }
                    });
                });
        }

        // ==================== CHAT FUNCTIONS ====================
        function openChat(userId, userData) {
            selectedUserId = userId;
            selectedUserData = userData;
            
            document.getElementById('users-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            const name = userData.name || userData.email?.split('@')[0] || 'User';
            document.getElementById('chat-header-name').textContent = name;
            
            if (messagesListener) messagesListener();
            if (typingListener) typingListener();
            if (userStatusListener) userStatusListener();
            
            document.getElementById('chat-error-banner').style.display = 'none';
            
            markAllMessagesAsRead(userId);
            
            loadMessages(userId);
            setupTypingListener(userId);
            setupUserStatusListener(userId);
        }

        async function markAllMessagesAsRead(senderId) {
            if (!currentUser) return;
            
            try {
                const snapshot = await db.collection('messages')
                    .where('senderId', '==', senderId)
                    .where('receiverId', '==', currentUser.uid)
                    .where('status', '==', 'sent')
                    .get();
                
                const batch = db.batch();
                snapshot.forEach(doc => {
                    batch.update(doc.ref, { status: 'read' });
                });
                await batch.commit();
                
                if (chatListData.has(senderId)) {
                    const data = chatListData.get(senderId);
                    data.unreadCount = 0;
                    chatListData.set(senderId, data);
                    renderChatList();
                }
            } catch (error) {
                console.error('Error marking messages as read:', error);
            }
        }

        function loadMessages(otherUserId) {
            const container = document.getElementById('messages-container');
            const errorBanner = document.getElementById('chat-error-banner');
            const currentUserId = auth.currentUser?.uid;
            
            if (!currentUserId || !otherUserId) {
                console.error('Missing user IDs');
                return;
            }
            
            container.innerHTML = '<div class="loading-spinner"></div>';
            errorBanner.style.display = 'none';
            
            const renderMessagesSnapshot = (snapshot) => {
                container.innerHTML = '';
                activeChatMessages = [];
                
                snapshot.forEach((doc) => {
                    const msg = { id: doc.id, ...doc.data() };
                    if ((msg.senderId === currentUserId && msg.receiverId === otherUserId) ||
                        (msg.senderId === otherUserId && msg.receiverId === currentUserId)) {
                        activeChatMessages.push(msg);
                    }
                });

                activeChatMessages.sort((a, b) => {
                    const timeA = a.timestamp?.toMillis ? a.timestamp.toMillis() : 0;
                    const timeB = b.timestamp?.toMillis ? b.timestamp.toMillis() : 0;
                    return timeA - timeB;
                });
                
                activeChatMessages.forEach((msg) => {
                    const messageEl = createMessageElement(msg);
                    container.appendChild(messageEl);
                });
                
                if (activeChatMessages.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">No messages yet. Say hello! 👋</div>';
                } else {
                    renderLastSentStatus();
                }
                
                scrollChatToBottom();
                errorBanner.style.display = 'none';
            };

            const startFallbackListener = () => {
                if (messagesListener) {
                    messagesListener();
                    messagesListener = null;
                }
                messagesListener = db.collection('messages')
                    .onSnapshot((snapshot) => {
                        renderMessagesSnapshot(snapshot);
                    }, (error) => {
                        console.error('Fallback messages listener error:', error);
                        container.innerHTML = '';
                        errorBanner.style.display = 'block';
                    });
            };

            const chatId = [currentUserId, otherUserId].sort().join('_');
            messagesListener = db.collection('messages')
                .where('chatId', '==', chatId)
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    renderMessagesSnapshot(snapshot);
                }, (error) => {
                    console.error('Primary message query failed, using fallback:', error);
                    startFallbackListener();
                });
        }
        
        function scrollChatToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        function retryLoadMessages() {
            if (selectedUserId) {
                loadMessages(selectedUserId);
            }
        }

        // NEW: WhatsApp-style online + last seen
        function setupUserStatusListener(userId) {
            const statusEl = document.getElementById('chat-header-status');
            statusEl.textContent = '';
            statusEl.classList.remove('online');
            userStatusListener = db.collection('users').doc(userId).onSnapshot((doc) => {
                if (!doc.exists) return;
                const data = doc.data();
                const lastActiveMs = data.lastActive?.toMillis ? data.lastActive.toMillis() : 0;
                const recentlyActive = lastActiveMs && (Date.now() - lastActiveMs < 45000);
                if (data.isOnline || recentlyActive) {
                    statusEl.textContent = 'Online';
                    statusEl.classList.add('online');
                } else if (data.lastActive) {
                    statusEl.textContent = `Last seen at ${formatLastSeen(data.lastActive.toDate())}`;
                    statusEl.classList.remove('online');
                } else {
                    statusEl.textContent = 'Offline';
                    statusEl.classList.remove('online');
                }
            });
        }

        function formatLastSeen(date) {
            const now = new Date();
            const sameDay = now.toDateString() === date.toDateString();
            if (sameDay) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return `${date.toLocaleDateString()} ${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        }

        // NEW: Instagram-style status under last sent message only
        function renderLastSentStatus() {
            const currentUserId = auth.currentUser?.uid;
            const sentMessages = activeChatMessages.filter(msg => msg.senderId === currentUserId);
            if (!sentMessages.length) return;
            const lastSent = sentMessages[sentMessages.length - 1];
            const wrapper = document.getElementById(`msg-${lastSent.id}`);
            if (!wrapper) return;
            const bubble = wrapper.querySelector('.message-bubble');
            if (!bubble) return;

            const label = document.createElement('div');
            label.className = 'chat-last-status';
            label.textContent = (lastSent.status === 'read') ? 'Seen' : (lastSent.status === 'delivered') ? 'Delivered' : 'Sent';
            bubble.appendChild(label);
        }

        function createMessageElement(message) {
            const wrapper = document.createElement('div');
            const isSent = message.senderId === auth.currentUser?.uid;
            wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
            wrapper.id = `msg-${message.id}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            // NEW: Long press options (for all, edit only for sent)
            bubble.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                openMessageOptions(message);
            });
            bubble.addEventListener('touchstart', () => {
                longPressTimer = setTimeout(() => openMessageOptions(message), 450);
            }, { passive: true });
            bubble.addEventListener('touchend', () => clearTimeout(longPressTimer));
            bubble.addEventListener('touchmove', () => clearTimeout(longPressTimer));

            // NEW: Double tap to like
            bubble.addEventListener('dblclick', () => addHeartReaction(message.id));
            let lastTap = 0;
            bubble.addEventListener('touchend', () => {
                const now = Date.now();
                if (now - lastTap < 300) addHeartReaction(message.id);
                lastTap = now;
            }, { passive: true });

            // NEW: Swipe right to reply
            let startX = 0;
            bubble.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, { passive: true });
            bubble.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                if (endX - startX > 70) setReplyTarget(message);
            }, { passive: true });

            let content = '';
            let replyContent = '';
            if (message.replyTo?.text || message.replyTo?.audioUrl || message.replyTo?.imageUrl) {
                const replyText = message.replyTo.text || (message.replyTo.audioUrl ? 'Voice note' : 'Image');
                replyContent = `<div class="reply-quote"><strong>${escapeHtml(message.replyTo.senderName || 'User')}</strong>${escapeHtml(replyText)}</div>`;
            }

            if (message.text) {
                content = `<div class="message-text">${escapeHtml(message.text)}</div>`;
            } else if (message.audioUrl) {
                content = `<audio controls class="voice-note" src="${message.audioUrl}"></audio>`;
            } else if (message.imageUrl) {
                content = `<img src="${message.imageUrl}" class="message-image" onclick="showImagePreview('${message.imageUrl}')">`;
            }
            
            const time = message.timestamp ? 
                new Date(message.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            
            bubble.innerHTML = `
                ${replyContent}
                ${content}
                <div class="message-footer">
                    ${message.edited ? '<span class="edited-label">(edited)</span>' : ''}
                    <span class="message-time">${time}</span>
                </div>
            `;
            
            if (message.reactions) {
                const values = Object.values(message.reactions);
                if (values.length) {
                    bubble.innerHTML += `<div class="message-reactions">${values.join(' ')}</div>`;
                }
            }
            
            wrapper.appendChild(bubble);
            return wrapper;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            
            if (!text && !selectedImage) return;
            if (!selectedUserId || !auth.currentUser) return;
            
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            
            try {
                if(isEditing) {
                    await db.collection('messages').doc(selectedMessageData.id).update({
                        text: text,
                        edited: true
                    });
                    cancelEdit();
                } else {
                    const chatId = [auth.currentUser.uid, selectedUserId].sort().join('_');
                    const messageData = {
                        chatId: chatId,
                        senderId: auth.currentUser.uid,
                        receiverId: selectedUserId,
                        participants: [auth.currentUser.uid, selectedUserId],
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        status: 'sent'
                    };
                    
                    if (selectedImage) {
                        messageData.imageUrl = selectedImage;
                        selectedImage = null;
                    } else {
                        messageData.text = text;
                    }
                    
                    if (replyToMessage) {
                        messageData.replyTo = {
                            messageId: replyToMessage.id,
                            senderId: replyToMessage.senderId,
                            senderName: replyToMessage.senderId === auth.currentUser.uid ? 'You' : (selectedUserData?.name || 'User'),
                            text: replyToMessage.text || '',
                            imageUrl: replyToMessage.imageUrl || '',
                            audioUrl: replyToMessage.audioUrl || ''
                        };
                    }
                    
                    await db.collection('messages').add(messageData);
                    input.value = '';
                    autoExpandInput();
                    cancelReply();
                    
                    try {
                        await db.collection('typing').doc(`${auth.currentUser.uid}_${selectedUserId}`).delete();
                    } catch (e) {}
                }
                
                scrollChatToBottom();

            } catch (error) {
                console.error('Error sending message:', error);
                alert('Failed to send message. Please try again.');
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        // ==================== MESSAGE EDIT/DELETE FUNCTIONS (NEW) ====================
        function openMessageOptions(message) {
            if (!message.id) return;
            selectedMessageData = { id: message.id, text: message.text || '', senderId: message.senderId };

            const ownMessage = message.senderId === auth.currentUser?.uid;
            document.getElementById('edit-option').style.display = ownMessage && message.text ? 'flex' : 'none';
            document.getElementById('message-options-overlay').style.display = 'flex';
        }

        function closeMessageOptions() {
            document.getElementById('message-options-overlay').style.display = 'none';
        }

        function handleEditOption() {
            if (!selectedMessageData.id || !selectedMessageData.text) return;
            isEditing = true;
            closeMessageOptions();
            
            document.getElementById('editing-banner').style.display = 'flex';
            const input = document.getElementById('chat-input');
            input.value = selectedMessageData.text;
            input.focus();
            
            document.getElementById('send-btn').innerHTML = '<i class="fas fa-check"></i>';
        }

        function cancelEdit() {
            isEditing = false;
            selectedMessageData = { id: null, text: null };
            document.getElementById('editing-banner').style.display = 'none';
            document.getElementById('chat-input').value = '';
            document.getElementById('send-btn').innerHTML = '<i class="fas fa-paper-plane"></i>';
        }

        async function handleDeleteOption() {
            if (!selectedMessageData.id) return;
            const msgId = selectedMessageData.id;
            closeMessageOptions();

            if (confirm('Are you sure you want to delete this message?')) {
                try {
                    await db.collection('messages').doc(msgId).delete();
                } catch (error) {
                    console.error('Error deleting message:', error);
                    alert('Failed to delete message.');
                }
            }
        }

        /* NEW: Instagram Reactions */
        async function reactToSelectedMessage(emoji) {
            if (!selectedMessageData.id || !auth.currentUser) return;
            try {
                await db.collection('messages').doc(selectedMessageData.id).set({
                    reactions: {
                        [auth.currentUser.uid]: emoji
                    }
                }, { merge: true });
                closeMessageOptions();
            } catch (error) {
                console.error('Reaction failed:', error);
            }
        }

        async function addHeartReaction(messageId) {
            if (!messageId || !auth.currentUser) return;
            try {
                await db.collection('messages').doc(messageId).set({
                    reactions: {
                        [auth.currentUser.uid]: '❤️'
                    }
                }, { merge: true });
            } catch (error) {
                console.error('Double tap reaction failed:', error);
            }
        }

        /* NEW: Swipe to reply */
        function setReplyTarget(message) {
            replyToMessage = message;
            document.getElementById('reply-banner').style.display = 'flex';
            const senderName = message.senderId === auth.currentUser?.uid ? 'You' : (selectedUserData?.name || 'User');
            document.getElementById('reply-author').textContent = senderName;
            document.getElementById('reply-text').textContent = message.text || (message.audioUrl ? 'Voice note' : 'Image');
        }

        function cancelReply() {
            replyToMessage = null;
            document.getElementById('reply-banner').style.display = 'none';
        }

        // ==================== TYPING INDICATOR (REWORKED) ====================
        function handleTyping(event) {
            if (!selectedUserId || !auth.currentUser) return;
            
            if (event instanceof KeyboardEvent && event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
                return;
            }
            autoExpandInput();
            
            const typingRef = db.collection('typing').doc(`${auth.currentUser.uid}_${selectedUserId}`);
            
            typingRef.set({
                isTyping: true,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(e => console.log('Typing error:', e));
            
            if (typingTimeout) clearTimeout(typingTimeout);
            
            typingTimeout = setTimeout(async () => {
                try {
                    await typingRef.delete();
                } catch (e) {}
            }, 2000);
        }

        function setupTypingListener(otherUserId) {
            const container = document.getElementById('messages-container');
            if (!auth.currentUser) return;

            try {
                typingListener = db.collection('typing')
                    .doc(`${otherUserId}_${auth.currentUser.uid}`)
                    .onSnapshot((doc) => {
                        const typingIndicator = document.getElementById('typing-indicator');
                        if (doc.exists && doc.data().isTyping) {
                            if (!typingIndicator) {
                                const indicatorEl = document.createElement('div');
                                indicatorEl.className = 'message-wrapper received';
                                indicatorEl.id = 'typing-indicator';
                                indicatorEl.innerHTML = `
                                    <div class="typing-indicator-bubble">
                                        <div class="typing-dots">
                                            <span></span><span></span><span></span>
                                        </div>
                                    </div>
                                `;
                                container.appendChild(indicatorEl);
                                scrollChatToBottom();
                            }
                        } else {
                            if (typingIndicator) {
                                typingIndicator.remove();
                            }
                        }
                    }, (error) => {
                        console.error('Typing listener error:', error);
                    });
            } catch (error) {
                console.error('Error setting up typing listener:', error);
            }
        }

        // ==================== IMAGE UPLOAD ====================
        function selectImage() {
            document.getElementById('image-input').click();
        }

        async function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                alert('Please select an image');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                alert('Image must be less than 5MB');
                return;
            }
            
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            
            try {
                const formData = new FormData();
                formData.append('image', file);
                
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    selectedImage = result.data.url;
                    await sendMessage();
                } else {
                    alert('Image upload failed');
                }
                
            } catch (error) {
                console.error('Error uploading image:', error);
                alert('Upload failed. Please try again.');
            } finally {
                sendBtn.disabled = false;
                event.target.value = '';
            }
        }

        function showImagePreview(url) {
            document.getElementById('preview-image').src = url;
            document.getElementById('image-preview').style.display = 'flex';
        }

        function closeImagePreview() {
            document.getElementById('image-preview').style.display = 'none';
        }

        // ==================== AUTH STATE OBSERVER ====================
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                console.log('Logged in as:', user.email);
                startPresenceHeartbeat();
                
                OneSignalDeferred.push(async function(OneSignal) {
                    try {
                        await OneSignal.login(user.uid);
                    } catch (e) {
                        console.log('OneSignal login skipped:', e);
                    }
                });
                
                db.collection('users').doc(user.uid).get().then((doc) => {
                    if (!doc.exists) {
                        db.collection('users').doc(user.uid).set({
                            name: user.displayName || user.email.split('@')[0],
                            email: user.email,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            isOnline: true,
                            lastActive: firebase.firestore.FieldValue.serverTimestamp()
                        }).catch(e => console.error('Error creating user doc:', e));
                    }
                }).catch(e => console.error('Error checking user doc:', e));
                
                // If the auth screen is visible, it means the user just logged in, so transition.
                if (document.getElementById('auth-screen').style.display === 'block') {
                    showUsersList();
                }
                
            } else {
                stopPresenceHeartbeat();
                currentUser = null;
                cleanupListeners();
                chatListData.clear();
                acceptedChats.clear();
                pendingRequests.clear();
                
                // If a protected screen is visible, go back to calculator
                if (document.getElementById('users-screen').style.display !== 'none' || 
                    document.getElementById('chat-screen').style.display !== 'none') {
                    returnToCalculator();
                }
            }
        });
        
        // NEW: presence state for background/close
        document.addEventListener('visibilitychange', () => {
            if (!currentUser) return;
            updatePresence(document.visibilityState === 'visible');
        });
        window.addEventListener('beforeunload', () => {
            if (currentUser) updatePresence(false);
        });
        
        // ==================== NEW: INPUT AUTO-EXPAND + KEYBOARD FIX ====================
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('focus', () => {
            setTimeout(() => {
                chatInput.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 300);
        });
        chatInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
        function autoExpandInput() {
            chatInput.style.height = 'auto';
            chatInput.style.height = `${Math.min(chatInput.scrollHeight, 140)}px`;
        }

        // NEW: Panic mode (double-tap anywhere in users/chat screen)
        function hideToCalculatorPanic() {
            selectedUserId = null;
            selectedUserData = null;
            if (messagesListener) { messagesListener(); messagesListener = null; }
            if (typingListener) { typingListener(); typingListener = null; }
            if (userStatusListener) { userStatusListener(); userStatusListener = null; }
            cancelEdit();
            cancelReply();
            returnToCalculator();
        }

        function addDoubleTapPanic(screenId) {
            const el = document.getElementById(screenId);
            let lastTapTime = 0;
            el.addEventListener('dblclick', hideToCalculatorPanic);
            el.addEventListener('touchend', () => {
                const now = Date.now();
                if (now - lastTapTime < 300) hideToCalculatorPanic();
                lastTapTime = now;
            }, { passive: true });
        }
        addDoubleTapPanic('users-screen');
        addDoubleTapPanic('chat-screen');

        // NEW: Voice notes via Firebase Storage
        async function startVoiceRecording(event) {
            event.preventDefault();
            if (!selectedUserId || !auth.currentUser || mediaRecorder) return;
            try {
                recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(recordingStream);
                recordedChunks = [];
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                mediaRecorder.start();
                document.getElementById('mic-btn').classList.add('recording');
            } catch (error) {
                console.error('Mic permission/recording error:', error);
                alert('Microphone access denied or unavailable.');
            }
        }

        async function stopVoiceRecording(event) {
            event.preventDefault();
            if (!mediaRecorder) return;
            const recorder = mediaRecorder;
            mediaRecorder = null;
            document.getElementById('mic-btn').classList.remove('recording');

            await new Promise((resolve) => {
                recorder.onstop = resolve;
                recorder.stop();
            });

            if (recordingStream) {
                recordingStream.getTracks().forEach(track => track.stop());
                recordingStream = null;
            }
            if (!recordedChunks.length) return;

            try {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const filePath = `voiceNotes/${auth.currentUser.uid}/${Date.now()}.webm`;
                const ref = storage.ref().child(filePath);
                await ref.put(blob);
                const audioUrl = await ref.getDownloadURL();

                await db.collection('messages').add({
                    chatId: [auth.currentUser.uid, selectedUserId].sort().join('_'),
                    senderId: auth.currentUser.uid,
                    receiverId: selectedUserId,
                    participants: [auth.currentUser.uid, selectedUserId],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent',
                    audioUrl: audioUrl,
                    audioPath: filePath
                });
            } catch (error) {
                console.error('Voice note send failed:', error);
                alert('Failed to send voice note.');
            }
        }

        // NEW: OneSignal disguised notification trigger
        async function sendDisguisedNotification() {
            if (!selectedUserId) {
                alert('Open a chat first.');
                return;
            }
            if (!ONE_SIGNAL_REST_API_KEY) {
                alert('Set ONE_SIGNAL_REST_API_KEY in code to enable targeted push.');
                return;
            }
            try {
                await fetch('https://onesignal.com/api/v1/notifications', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8',
                        'Authorization': `Basic ${ONE_SIGNAL_REST_API_KEY}`
                    },
                    body: JSON.stringify({
                        app_id: ONE_SIGNAL_APP_ID,
                        include_external_user_ids: [selectedUserId],
                        headings: { en: 'Calculator Update' },
                        contents: { en: 'Use Calculator app for perfect calculations' }
                    })
                });
                alert('Calculator update notification sent.');
            } catch (error) {
                console.error('OneSignal send failed:', error);
                alert('Failed to send disguised notification.');
            }
        }

        // Initialize calculator display
        updateDisplay();
        returnToCalculator();
    </script>
</body>
</html>
