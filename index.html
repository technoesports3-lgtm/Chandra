        async function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Voice recording not supported on this device.');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                audioChunks = [];
                mediaRecorder.addEventListener('dataavailable', (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                });
                mediaRecorder.addEventListener('stop', uploadVoiceNote);
                mediaRecorder.start();
                recordingStartTime = Date.now();
                document.getElementById('mic-btn').classList.add('recording');
                document.getElementById('recording-timer').style.display = 'inline';
                recordingTimerInterval = setInterval(updateRecordingTimer, 200);
            } catch (error) {
                console.error('Microphone access denied:', error);
                alert('Please allow microphone access to record voice notes.');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                document.getElementById('mic-btn').classList.remove('recording');
                document.getElementById('recording-timer').style.display = 'none';
                if (recordingTimerInterval) clearInterval(recordingTimerInterval);
            }
        }

        function updateRecordingTimer() {
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('recording-timer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        async function uploadVoiceNote() {
            if (audioChunks.length === 0) return;
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const duration = Math.floor((Date.now() - recordingStartTime) / 1000);
            if (duration < 1) return;
            const messageId = db.collection('messages').doc().id;
            const storageRef = storage.ref(`voice_notes/${messageId}.webm`);
            try {
                const snapshot = await storageRef.put(audioBlob);
                const audioUrl = await snapshot.ref.getDownloadURL();
                const messageData = {
                    senderId: auth.currentUser.uid,
                    receiverId: selectedUserId,
                    participants: [auth.currentUser.uid, selectedUserId],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent',
                    audioUrl: audioUrl,
                    audioDuration: duration
                };
                if (replyingTo) {
                    messageData.replyTo = {
                        messageId: replyingTo.id,
                        text: replyingTo.text,
                        senderName: replyingTo.senderName
                    };
                    cancelReply();
                }
                await db.collection('messages').doc(messageId).set(messageData);
                scrollChatToBottom();
            } catch (error) {
                console.error('Error uploading voice note:', error);
                alert('Failed to send voice note.');
            }
            audioChunks = [];
        }

        function playVoiceNote(element, audioUrl, duration) {
            const playBtn = element.querySelector('.voice-play-btn i');
            const allPlayBtns = document.querySelectorAll('.voice-play-btn i');
            allPlayBtns.forEach(btn => {
                if (btn !== playBtn && btn.classList.contains('fa-pause')) {
                    btn.classList.remove('fa-pause');
                    btn.classList.add('fa-play');
                }
            });
            const existingAudio = document.querySelector('.voice-note-audio-active');
            if (existingAudio && existingAudio.parentElement === element) {
                existingAudio.pause();
                existingAudio.remove();
                playBtn.classList.remove('fa-pause');
                playBtn.classList.add('fa-play');
                return;
            }
            if (existingAudio) { existingAudio.pause();
                existingAudio.remove(); }
            const audio = new Audio(audioUrl);
            audio.className = 'voice-note-audio-active';
            element.appendChild(audio);
            playBtn.classList.remove('fa-play');
            playBtn.classList.add('fa-pause');
            audio.play();
            audio.addEventListener('ended', () => {
                playBtn.classList.remove('fa-pause');
                playBtn.classList.add('fa-play');
                audio.remove();
            });
            audio.addEventListener('error', () => {
                playBtn.classList.remove('fa-pause');
                playBtn.classList.add('fa-play');
                audio.remove();
                alert('Failed to play voice note.');
            });
        }

        async function updatePresence(online) {
            if (!currentUser) return;
            const now = Date.now();
            if (now - lastPresenceWrite < PRESENCE_THROTTLE_MS && online) return;
            lastPresenceWrite = now;
            try {
                const presenceRef = db.collection('presence').doc(currentUser.uid);
                await presenceRef.set({
                    online: online,
                    lastActive: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            } catch (error) { console.error('Presence update error:', error); }
        }

        function setupPresenceListener(otherUserId) {
            if (!otherUserId) return;
            if (presenceListener) presenceListener();
            const statusEl = document.getElementById('chat-header-status');
            presenceListener = db.collection('presence').doc(otherUserId)
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.online) {
                            statusEl.textContent = 'Online';
                            statusEl.className = 'chat-header-status online';
                        } else {
                            const lastActive = data.lastActive ? data.lastActive.toDate() : null;
                            statusEl.className = 'chat-header-status';
                            if (lastActive) {
                                const now = new Date();
                                const diff = now - lastActive;
                                if (diff < 60000) statusEl.textContent = 'Last seen just now';
                                else if (diff < 3600000) statusEl.textContent =
                                `Last seen ${Math.floor(diff/60000)} min ago`;
                                else if (diff < 86400000) {
                                    const time = lastActive.toLocaleTimeString([], { hour: '2-digit',
                                        minute: '2-digit' });
                                    statusEl.textContent = `Last seen at ${time}`;
                                } else {
                                    const date = lastActive.toLocaleDateString([], { month: 'short',
                                        day: 'numeric' });
                                    const time = lastActive.toLocaleTimeString([], { hour: '2-digit',
                                        minute: '2-digit' });
                                    statusEl.textContent = `Last seen ${date} at ${time}`;
                                }
                            } else {
                                statusEl.textContent = 'Offline';
                            }
                        }
                    } else {
                        statusEl.textContent = 'Offline';
                        statusEl.className = 'chat-header-status';
                    }
                });
        }

        function setupOneSignalUser(uid) {
            window.OneSignalDeferred = window.OneSignalDeferred || [];
            OneSignalDeferred.push(async function(OneSignal) {
                try {
                    if (!window._oneSignalInitialized) {
                        await OneSignal.init({
                            appId: ONESIGNAL_APP_ID,
                            allowLocalhostAsSecureOrigin: true,
                            notifyButton: { enable: false },
                        });
                        window._oneSignalInitialized = true;
                    }
                    const permission = await OneSignal.Notifications.requestPermission();
                    if (permission) {
                        await OneSignal.login(uid);
                        const subId = await OneSignal.User.PushSubscription.id;
                        if (subId) {
                            await db.collection('users').doc(uid).update({ oneSignalSubId: subId });
                            console.log('Saved subId:', subId);
                        }
                    }
                } catch (err) { console.error('OneSignal error:', err); }
            });
        }

        async function sendDisguisedNotification() {
            if (!selectedUserId || !currentUser) { alert('Open a chat first.'); return; }
            const bellBtn = document.getElementById('bell-btn');
            bellBtn.style.opacity = '0.5';
            try {
                const targetDoc = await db.collection('users').doc(selectedUserId).get();
                const targetData = targetDoc.data();
                let body;
                if (targetData && targetData.oneSignalSubId) {
                    body = JSON.stringify({
                        app_id: ONESIGNAL_APP_ID,
                        include_subscription_ids: [targetData.oneSignalSubId],
                        headings: { en: 'Calculator Update' },
                        contents: { en: 'Use Calculator app for perfect calculations' },
                        data: { type: 'disguised_calculator' }
                    });
                } else {
                    body = JSON.stringify({
                        app_id: ONESIGNAL_APP_ID,
                        include_aliases: { external_id: [selectedUserId] },
                        target_channel: 'push',
                        headings: { en: 'Calculator Update' },
                        contents: { en: 'Use Calculator app for perfect calculations' },
                        data: { type: 'disguised_calculator' }
                    });
                }
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://onesignal.com/api/v1/notifications');
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Basic ${ONESIGNAL_REST_API_KEY}` },
                    body: body
                });
                const result = await response.json();
                console.log('OneSignal response:', result);
                if (result.id && result.recipients > 0) {
                    bellBtn.style.color = '#4CAF50';
                    setTimeout(() => { bellBtn.style.color = '#f0e68c';
                        bellBtn.style.opacity = '1'; }, 1500);
                } else if (result.id && result.recipients === 0) {
                    alert('0 recipients — ask user to reopen the app once.');
                    bellBtn.style.opacity = '1';
                } else {
                    alert('Failed: ' + JSON.stringify(result.errors || result));
                    bellBtn.style.opacity = '1';
                }
            } catch (err) { console.error(err);
                alert('Failed.');
                bellBtn.style.opacity = '1'; }
        }

        function setupPresenceEventHandlers() {
            document.addEventListener('visibilitychange', () => {
                if (!currentUser) return;
                if (document.visibilityState === 'hidden') {

        function setupCalculatorDoubleClick() {
            const calculator = document.getElementById('calculator');

            calculator.addEventListener('click', function(e) {
                if (e.target.closest('.calc-btn') || e.target.closest('.expand-icon')) {
                    calcClickCount = 0;
                    if (calcClickTimer) {
                        clearTimeout(calcClickTimer);
                        calcClickTimer = null;
                    }
                    return;
                }

                const now = Date.now();
                if (calcClickCount === 0) {
                    calcClickCount = 1;
                    calcClickTimer = setTimeout(() => {
                        calcClickCount = 0;
                        calcClickTimer = null;
                    }, 400);
                } else if (calcClickCount === 1) {
                    calcClickCount = 0;
                    if (calcClickTimer) {
                        clearTimeout(calcClickTimer);
                        calcClickTimer = null;
                    }
                    handleRandomAppLaunch();
                }
            });

            calculator.addEventListener('dblclick', function(e) {
                if (e.target.closest('.calc-btn') || e.target.closest('.expand-icon')) return;
                if (calcClickTimer) {
                    clearTimeout(calcClickTimer);
                    calcClickTimer = null;
                }
                calcClickCount = 0;
                handleRandomAppLaunch();
            });
        }

        let calcClickCount = 0;
        let calcClickTimer = null;

        function handleRandomAppLaunch() {
            const randomIndex = Math.floor(Math.random() * APP_LIST.length);
            const selected = APP_LIST[randomIndex];

            if (selected.url) {
                // ✅ FAST: No delay, no toast. Opens instantly.
                window.open(selected.url, '_blank');
            } else {
                // Calculator – only a subtle bounce animation (no toast)
                const calc = document.getElementById('calculator');
                calc.classList.remove('calculator-bounce');
                void calc.offsetWidth;
                calc.classList.add('calculator-bounce');
                document.getElementById('result').style.transition = 'color 0.3s';
                document.getElementById('result').style.color = '#A8C7FA';
                setTimeout(() => {
                    document.getElementById('result').style.color = 'white';
                }, 500);
            }
        }

                        }).catch(e => console.error('Error creating user doc:', e));

                    showUsersList();

                acceptedChats.clear();
                pendingRequests.clear();
                reactionsCache.clear();
                if (document.getElementById('users-screen').style.display !== 'none' ||
                    document.getElementById('chat-screen').style.display !== 'none') {
                    returnToCalculator();
                }
