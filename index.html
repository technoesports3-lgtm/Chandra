<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculator + Chat</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- OneSignal -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <!-- Calculator -->
        <div class="calculator" id="calculator">
            <div class="calculator-header"><span></span><span class="expand-icon" id="expandIcon" onclick="toggleScientific()"><i class="fas fa-chevron-up"></i></span></div>
            <div class="calculator-display"><div class="expression" id="expression"></div><div class="result" id="result">0</div></div>
            <div class="scientific-row" id="scientificRow">
                <button class="calc-btn" onclick="appendScientific('sin')">sin</button><button class="calc-btn" onclick="appendScientific('cos')">cos</button><button class="calc-btn" onclick="appendScientific('tan')">tan</button><button class="calc-btn" onclick="appendScientific('log')">log</button>
                <button class="calc-btn" onclick="appendScientific('ln')">ln</button><button class="calc-btn" onclick="appendScientific('√')">√</button><button class="calc-btn" onclick="appendScientific('^')">^</button><button class="calc-btn" onclick="appendScientific('!')">!</button>
            </div>
            <div class="buttons-grid">
                <button class="calc-btn ac" onclick="clearAll()">AC</button><button class="calc-btn" onclick="backspace()">⌫</button><button class="calc-btn operator" onclick="appendOperator('%')">%</button><button class="calc-btn operator" onclick="appendOperator('/')">÷</button>
                <button class="calc-btn" onclick="appendNumber('7')">7</button><button class="calc-btn" onclick="appendNumber('8')">8</button><button class="calc-btn" onclick="appendNumber('9')">9</button><button class="calc-btn operator" onclick="appendOperator('*')">×</button>
                <button class="calc-btn" onclick="appendNumber('4')">4</button><button class="calc-btn" onclick="appendNumber('5')">5</button><button class="calc-btn" onclick="appendNumber('6')">6</button><button class="calc-btn operator" onclick="appendOperator('-')">−</button>
                <button class="calc-btn" onclick="appendNumber('1')">1</button><button class="calc-btn" onclick="appendNumber('2')">2</button><button class="calc-btn" onclick="appendNumber('3')">3</button><button class="calc-btn operator" onclick="appendOperator('+')">+</button>
                <button class="calc-btn zero" onclick="appendNumber('0')">0</button><button class="calc-btn" onclick="appendDecimal()">.</button><button class="calc-btn operator" onclick="calculate()">=</button>
            </div>
        </div>

        <!-- Auth Screen -->
        <div class="auth-screen" id="auth-screen"><div class="auth-container"><div class="auth-header"><h2>Welcome</h2><p>Sign in to continue</p></div><div class="auth-tabs"><div class="auth-tab active" onclick="switchAuthTab('login')">Login</div><div class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</div></div><div class="auth-form active" id="login-form"><input type="email" class="auth-input" id="login-email" placeholder="Email" autocomplete="email"><div class="input-group"><input type="password" class="auth-input password-input" id="login-password" placeholder="Password" autocomplete="current-password"><span class="password-toggle" onclick="togglePasswordVisibility('login-password',this)"><i class="far fa-eye"></i></span></div><button class="auth-btn" onclick="handleLogin()" id="login-btn">Login</button><div id="login-error" class="error-banner" style="display:none;margin-top:8px;"></div></div><div class="auth-form" id="signup-form"><input type="text" class="auth-input" id="signup-name" placeholder="Your Name" autocomplete="name"><input type="email" class="auth-input" id="signup-email" placeholder="Email" autocomplete="email"><div class="input-group"><input type="password" class="auth-input password-input" id="signup-password" placeholder="Password" autocomplete="new-password"><span class="password-toggle" onclick="togglePasswordVisibility('signup-password',this)"><i class="far fa-eye"></i></span></div><div class="input-group"><input type="password" class="auth-input password-input" id="signup-confirm-password" placeholder="Confirm Password" autocomplete="new-password"><span class="password-toggle" onclick="togglePasswordVisibility('signup-confirm-password',this)"><i class="far fa-eye"></i></span></div><button class="auth-btn" onclick="handleSignup()" id="signup-btn">Sign Up</button><div id="signup-error" class="error-banner" style="display:none;margin-top:8px;"></div></div></div></div>

        <!-- Users Screen -->
        <div class="users-screen" id="users-screen"><div class="users-header"><h2>Chats</h2><div class="header-actions"><button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button><button onclick="returnToCalculator()"><i class="fas fa-calculator"></i></button></div></div><div class="current-user-badge" id="current-user-badge"><div class="badge-avatar" id="current-user-avatar">?</div><div class="badge-info"><div class="badge-name" id="current-user-name">Loading...</div><div class="badge-label">You</div></div></div><div class="search-container"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="Search users by name or email" oninput="searchUsers()"></div></div><div class="search-results" id="search-results"></div><div class="requests-tab"><button class="active" onclick="switchChatTab('chats')" id="chats-tab">Chats</button><button onclick="switchChatTab('requests')" id="requests-tab">Requests</button></div><div class="users-container" id="chats-container"><div class="loading-spinner"></div></div><div class="requests-container" id="requests-container"><div class="loading-spinner"></div></div><div class="error-banner" id="user-error-banner">Error loading data. <button class="retry-btn" onclick="loadData()">Retry</button></div></div>

        <!-- Chat Screen -->
        <div class="chat-screen" id="chat-screen">
            <div class="chat-header" id="chat-main-header">
                <button class="back-btn" onclick="goBackToUsers()"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-header-info" id="chat-header-info-click" onclick="openChatInfoPanel()">
                    <div class="chat-header-name" id="chat-header-name">Loading...</div>
                    <div class="chat-header-status" id="chat-header-status"></div>
                </div>
                <button class="bell-btn" id="bell-btn" onclick="sendDisguisedNotification()" title="Notify user"><i class="fas fa-bell"></i></button>
                <button class="bell-btn" onclick="toggleChatSearch()" title="Search in chat"><i class="fas fa-search"></i></button>
            </div>
            <div class="chat-search-bar" id="chat-search-bar">
                <i class="fas fa-search" style="color:#888;"></i>
                <input type="text" id="chat-search-input" placeholder="Search messages..." oninput="searchInChat()">
                <span id="search-loading-spinner" class="search-loading-spinner"></span>
                <span class="search-nav" id="search-nav" style="display:none;">
                    <span id="search-count">0/0</span>
                    <button class="search-nav-btn" onclick="navigateSearch(-1)">▲</button>
                    <button class="search-nav-btn" onclick="navigateSearch(1)">▼</button>
                </span>
                <span class="search-close" onclick="toggleChatSearch()">✕</span>
            </div>
            <div class="error-banner" id="chat-error-banner">Error loading messages. <button class="retry-btn" onclick="retryLoadMessages()">Retry</button></div>
            <div class="messages-container" id="messages-container"></div>
            <div class="chat-input-area">
                <div class="reply-preview" id="reply-preview"><div class="reply-preview-content"><div class="reply-preview-name" id="reply-preview-name"></div><div id="reply-preview-text"></div></div><span class="cancel-reply-btn" onclick="cancelReply()">&times;</span></div>
                <div class="editing-banner" id="editing-banner"><div class="editing-banner-info"><i class="fas fa-pencil-alt"></i><span>Editing Message</span></div><i class="fas fa-times cancel-edit-btn" onclick="cancelEdit()"></i></div>
                <div class="chat-input-container">
                    <button class="attach-btn" onclick="selectImage()"><i class="fas fa-paperclip"></i></button>
                    <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
                    <button class="gif-btn" onclick="openGifPicker()" title="GIF">GIF</button>
                    <div class="chat-input-wrapper"><textarea class="chat-input" id="chat-input" placeholder="Message" rows="1" onkeyup="handleTyping(event)" oninput="autoExpandTextarea()"></textarea></div>
                    <button class="mic-btn" id="mic-btn" onmousedown="startRecording()" onmouseup="stopRecording()" onmouseleave="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()" ontouchcancel="stopRecording()"><i class="fas fa-microphone"></i></button>
                    <span class="recording-timer" id="recording-timer">0:00</span>
                    <button class="send-btn" onclick="sendMessage()" id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- Chat Info Panel -->
        <div class="chat-info-panel" id="chat-info-panel">
            <div class="chat-info-header">
                <button class="back-btn" onclick="closeChatInfoPanel()"><i class="fas fa-arrow-left"></i></button>
                <span class="chat-info-title" id="chat-info-title">Chat Info</span>
            </div>
            <div class="chat-info-tabs">
                <div class="chat-info-tab active" onclick="switchInfoTab('media')">Media</div>
                <div class="chat-info-tab" onclick="switchInfoTab('links')">Links</div>
                <div class="chat-info-tab" onclick="switchInfoTab('docs')">Docs</div>
            </div>
            <div class="chat-info-content active" id="info-media"><div class="media-grid" id="media-grid"></div><div class="no-media-msg" id="no-media-msg" style="display:none;">No media shared yet</div></div>
            <div class="chat-info-content" id="info-links"><div id="links-list"></div><div class="no-media-msg" id="no-links-msg" style="display:none;">No links shared yet</div></div>
            <div class="chat-info-content" id="info-docs"><div id="docs-list"></div><div class="no-media-msg" id="no-docs-msg" style="display:none;">No documents shared yet</div></div>
        </div>

        <!-- Image Preview -->
        <div class="image-preview-modal" id="image-preview" onclick="closeImagePreview()">
            <span class="close-preview">&times;</span>
            <div class="preview-image-container" id="preview-image-container">
                <img class="preview-image" id="preview-image" src="">
            </div>
        </div>

        <!-- Emoji Reaction Tray -->
        <div class="emoji-tray-overlay" id="emoji-tray-overlay" onclick="closeEmojiTray()">
            <div class="emoji-tray" onclick="event.stopPropagation()">
                <button class="emoji-option" onclick="addReaction('❤️')">❤️</button><button class="emoji-option" onclick="addReaction('😂')">😂</button><button class="emoji-option" onclick="addReaction('😮')">😮</button><button class="emoji-option" onclick="addReaction('😢')">😢</button><button class="emoji-option" onclick="addReaction('😡')">😡</button><button class="emoji-option" onclick="addReaction('👍')">👍</button>
                <div class="emoji-tray-actions">
                    <button class="emoji-tray-action-btn" id="tray-edit-btn" onclick="handleEditFromTray()"><i class="fas fa-pencil-alt"></i> Edit</button>
                    <button class="emoji-tray-action-btn delete" id="tray-delete-btn" onclick="handleDeleteFromTray()"><i class="fas fa-trash-alt"></i> Unsend</button>
                </div>
            </div>
        </div>

        <!-- GIF Picker -->
        <div class="gif-picker-overlay" id="gif-picker-overlay" onclick="closeGifPicker()">
            <div class="gif-picker" onclick="event.stopPropagation()">
                <div class="gif-picker-header">
                    <input type="text" id="gif-search-input" placeholder="Search GIFs..." oninput="searchGifs()">
                    <span class="gif-picker-close" onclick="closeGifPicker()">✕</span>
                </div>
                <div class="gif-grid" id="gif-grid"><div class="gif-placeholder">Search for GIFs above</div></div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="script.js" defer></script>
</body>
</html>
